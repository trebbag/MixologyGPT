name: Staging Sign-Off (Load + Gates)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Staging base URL to test (leave empty to use STAGING_BASE_URL secret)."
        required: false
        default: ""
      web_base_url:
        description: "Staging web URL to test (leave empty to use STAGING_WEB_BASE_URL or STAGING_BASE_URL)."
        required: false
        default: ""
      users:
        description: "Concurrent users for the tuned profile."
        required: false
        default: "40"
      spawn_rate:
        description: "User spawn rate per second."
        required: false
        default: "8"
      duration:
        description: "Duration (locust -t), e.g. 5m, 10m."
        required: false
        default: "5m"

jobs:
  load-and-evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required config
        env:
          BASE_URL: ${{ github.event.inputs.base_url || secrets.STAGING_BASE_URL }}
          WEB_BASE_URL: ${{ github.event.inputs.web_base_url || secrets.STAGING_WEB_BASE_URL || github.event.inputs.base_url || secrets.STAGING_BASE_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${BASE_URL}" ]]; then
            echo "Missing STAGING_BASE_URL (or workflow input base_url)."
            exit 1
          fi
          if [[ -z "${WEB_BASE_URL}" ]]; then
            echo "Missing STAGING_WEB_BASE_URL (or workflow input web_base_url)."
            exit 1
          fi
      - name: Runtime surface smoke
        env:
          BASE_URL: ${{ github.event.inputs.base_url || secrets.STAGING_BASE_URL }}
          WEB_BASE_URL: ${{ github.event.inputs.web_base_url || secrets.STAGING_WEB_BASE_URL || github.event.inputs.base_url || secrets.STAGING_BASE_URL }}
        run: |
          set -euo pipefail
          python3 ./infra/staging/runtime_surface_smoke.py \
            --api-base-url "${BASE_URL}" \
            --web-base-url "${WEB_BASE_URL}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install loadtest dependencies (Locust)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r infra/loadtest/requirements.txt
      - name: Bootstrap loadtest access token
        env:
          BASE_URL: ${{ github.event.inputs.base_url || secrets.STAGING_BASE_URL }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          import urllib.error

          base_url = os.environ["BASE_URL"].rstrip("/")
          run_id = os.environ["RUN_ID"]
          email = f"loadtest+{run_id}@bartender.ai"
          password = f"LoadTest-{run_id}-Aa1!"

          def post(path, payload):
              req = urllib.request.Request(
                  f"{base_url}{path}",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as res:
                      body = res.read().decode("utf-8") or "{}"
                      return res.status, json.loads(body)
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8") or "{}"
                  try:
                      return exc.code, json.loads(body)
                  except Exception:
                      return exc.code, {"detail": body}

          register_status, register_body = post("/v1/auth/register", {"email": email, "password": password})
          # 201=create, 400=already exists; either is acceptable for this ephemeral account pattern.
          if register_status not in (200, 201, 400):
              raise SystemExit(f"register failed: status={register_status} body={register_body}")

          login_status, login_body = post("/v1/auth/jwt/login", {"email": email, "password": password})
          if login_status != 200:
              raise SystemExit(f"login failed: status={login_status} body={login_body}")
          token = login_body.get("access_token")
          if not token:
              raise SystemExit(f"login missing access_token: {login_body}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"LOADTEST_ACCESS_TOKEN={token}\n")
          PY
      - name: Run tuned profile against staging and evaluate locked gates
        env:
          BASE_URL: ${{ github.event.inputs.base_url || secrets.STAGING_BASE_URL }}
          USERS: ${{ github.event.inputs.users }}
          SPAWN_RATE: ${{ github.event.inputs.spawn_rate }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          set -euo pipefail
          RUN_ID="staging_signoff_${GITHUB_RUN_ID}"
          echo "BASE_URL=${BASE_URL}"
          echo "RUN_ID=${RUN_ID}"
          USERS="${USERS}" SPAWN_RATE="${SPAWN_RATE}" DURATION="${DURATION}" \
            RUN_ID="${RUN_ID}" \
            GATES_FILE="infra/loadtest/gates.pilot.locked.json" \
            LOCK_GATES="false" \
            ./infra/loadtest/run_staging_profile.sh "${BASE_URL}"
      - name: Upload artifacts (gates report + locust outputs)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: staging-signoff-loadtest
          path: |
            infra/loadtest/results/staging_signoff_${{ github.run_id }}_stats.csv
            infra/loadtest/results/staging_signoff_${{ github.run_id }}_stats_history.csv
            infra/loadtest/results/staging_signoff_${{ github.run_id }}.html
            infra/loadtest/results/staging_signoff_${{ github.run_id }}_gates.md
